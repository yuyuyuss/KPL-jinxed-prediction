<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍭 KPL 毒奶预测板 🍭</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍭</text></svg>">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="pet-corner">🐱</div>
  
  <!-- 登录/房间选择页面 -->
  <div id="login-page" class="page">
    <div class="login-card">
      <h1 class="title">🍬 KPL 毒奶预测板 🍬</h1>
      <p class="subtitle">赛博预言家们，准备好了吗？✨</p>
      
      <div class="form-group">
        <label>🐣 你的昵称</label>
        <input type="text" id="username" placeholder="输入你的可爱昵称~" maxlength="10">
      </div>
      
      <div class="form-group">
        <label>🔑 房间码</label>
        <input type="text" id="room-code" placeholder="4位房间码，如 A68K" maxlength="4" style="text-transform: uppercase; letter-spacing: 4px;">
      </div>
      
      <button id="join-room" class="btn btn-primary">加入房间 🚪</button>
      <button id="create-room" class="btn btn-secondary">创建新房间 ✨</button>
      
      <div class="login-tips">
        <p>💡 提示：输入房间码加入朋友的房间</p>
        <p>🎮 或者创建新房间开始游戏</p>
      </div>
    </div>
  </div>

  <!-- 主游戏页面 -->
  <div id="game-page" class="page hidden">
    <!-- 顶部状态栏 -->
    <header class="game-header">
      <div class="header-left">
        <div class="room-display">
          <span class="room-label">🏠 房间</span>
          <div class="room-code-box">
            <span id="current-room" class="room-code-text">----</span>
            <button id="copy-room-btn" class="copy-btn" title="复制房间码">📋</button>
          </div>
        </div>
        <div class="user-display">
          <span class="user-avatar" id="user-avatar">🐣</span>
          <span id="current-user">玩家</span>
        </div>
      </div>
      <div class="header-right">
        <span class="title-badge" id="user-title">🌸 新手预言家</span>
        <button id="logout-btn" class="btn btn-small">退出 🚪</button>
      </div>
    </header>

    <!-- 毒奶能量条 -->
    <div class="poison-bar-container">
      <div class="poison-bar-header">
        <span>💜 毒奶能量</span>
        <span id="poison-percent">0%</span>
      </div>
      <div class="poison-bar">
        <div class="poison-fill" id="poison-fill"></div>
      </div>
      <p class="poison-tip">每猜错一场涨 25%，满 100% 可释放毒奶弹幕！</p>
      <button id="release-poison" class="btn btn-poison hidden">释放毒奶！💥</button>
    </div>

    <!-- 主要内容区 -->
    <div class="main-content">
      <!-- 比赛列表 -->
      <div class="matches-section">
        <h2 class="section-title">📋 比赛列表</h2>
        <div id="matches-list" class="matches-list">
          <div class="loading">🍩 加载中...</div>
        </div>
        
        <!-- 隐藏的管理员按钮 -->
        <button id="admin-toggle" class="admin-toggle">🔧 点击5次开启管理员模式</button>
        <div id="admin-panel" class="admin-panel hidden">
          <h3>🔧 管理员面板 - 比赛结算</h3>
          <p class="admin-tip">选择比赛并输入实际比分，系统会自动计算积分</p>
          <div class="admin-form">
            <label>选择比赛:</label>
            <select id="match-select"></select>
            <div class="score-input-row">
              <div class="score-input-group">
                <label>Team A 得分</label>
                <input type="number" id="score-a" min="0" max="5" placeholder="0">
              </div>
              <div class="score-vs">:</div>
              <div class="score-input-group">
                <label>Team B 得分</label>
                <input type="number" id="score-b" min="0" max="5" placeholder="0">
              </div>
            </div>
            <button id="submit-score" class="btn btn-admin">上传比分并结算 ✅</button>
          </div>
        </div>
      </div>

      <!-- 排行榜 -->
      <div class="leaderboard-section">
        <h2 class="section-title">🏆 房间排行榜</h2>
        <div id="leaderboard" class="leaderboard">
          <div class="loading">🍩 加载中...</div>
        </div>
      </div>
    </div>

    <!-- 弹幕容器 -->
    <div id="danmaku-container" class="danmaku-container"></div>
  </div>

  <!-- 预测弹窗 -->
  <div id="prediction-modal" class="modal hidden">
    <div class="modal-content">
      <h3>🎯 来预测这场比赛吧！</h3>
      <div id="modal-match-info"></div>
      
      <div class="prediction-section">
        <label>🐾 第一步：选择你支持的队伍</label>
        <div class="team-buttons">
          <button id="pick-team-a" class="team-btn"></button>
          <button id="pick-team-b" class="team-btn"></button>
        </div>
      </div>
      
      <div class="prediction-section">
        <label>📊 第二步：预测最终比分</label>
        <div class="score-options">
          <button class="score-btn" data-score="3:0">3:0</button>
          <button class="score-btn" data-score="3:1">3:1</button>
          <button class="score-btn" data-score="3:2">3:2</button>
          <button class="score-btn" data-score="0:3">0:3</button>
          <button class="score-btn" data-score="1:3">1:3</button>
          <button class="score-btn" data-score="2:3">2:3</button>
        </div>
      </div>
      
      <div class="modal-actions">
        <button id="submit-prediction" class="btn btn-primary">冲鸭！🚀</button>
        <button id="cancel-prediction" class="btn btn-secondary">再想想</button>
      </div>
    </div>
  </div>

  <!-- 结果弹窗 -->
  <div id="result-modal" class="modal hidden">
    <div class="modal-content result-modal">
      <div id="result-emoji" class="result-emoji">🎉</div>
      <h3 id="result-title">太棒了！</h3>
      <p id="result-message"></p>
      <button id="close-result" class="btn btn-primary">好的~ ✨</button>
    </div>
  </div>

  <!-- 飘落动画容器 -->
  <div id="falling-container" class="falling-container hidden"></div>

  <!-- ========== 脚本加载顺序 ========== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
